apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-mcp
  labels:
    app: uptime-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uptime-mcp
  template:
    metadata:
      labels:
        app: uptime-mcp
    spec:
      containers:
        - name: uptime-mcp
          image: ghcr.io/uptime-com/uptime-mcp/app/uptime-mcp:latest
          args:
            - -transport=http
            - -listen=:8080
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
