apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: uptime-mcp

resources:
  - ../../base
  - ./resources/ingress.yaml

images:
  - name: uptime-mcp
    newName: ghcr.io/uptime-com/uptime-mcp
    newTag: latest

patches:
  - target:
      kind: Deployment
    path: patches/deployment.yaml
